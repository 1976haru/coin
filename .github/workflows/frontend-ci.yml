name: frontend-ci
on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect Vite project
        id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "has_pkg=true" >> $GITHUB_OUTPUT
          else
            echo "has_pkg=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.has_pkg == 'true'
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install + Build
        if: steps.detect.outputs.has_pkg == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build --if-present
          npm test --if-present -- --watchAll=false
      - name: HTML smoke (no Vite)
        if: steps.detect.outputs.has_pkg != 'true'
        run: |
          test -f frontend/index.html
          echo "frontend/index.html present"
